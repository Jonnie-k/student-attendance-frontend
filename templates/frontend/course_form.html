{% extends "frontend/base.html" %}

{% block title %}
{% if course %}Edit Course{% else %}Add Course{% endif %}
{% endblock %}

{% block content %}

<h2 class="mb-4">
    {% if course %}Edit Course{% else %}Add Course{% endif %}
</h2>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Course Name</label>
        <input
            type="text"
            name="course_name"
            class="form-control"
            value="{{ course.course_name|default:'' }}"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Course Code</label>
        <input
            type="text"
            name="course_code"
            class="form-control"
            value="{{ course.course_code|default:'' }}"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Teacher</label>

        <select
            name="teacher"
            class="form-select"
            required
        >
            {% for teacher in teachers %}
                <option
                    value="{{ teacher.id }}"
                    {% if course.teacher == teacher.id %}selected{% endif %}
                >
                    {{ teacher.full_name|default:teacher.username }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-success">
        Save Course
    </button>

    <a href="{% url 'courses' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
