{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Attendance Management System{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- Top Navigation -->
<nav class="navbar navbar-dark bg-success shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-mortarboard-fill"></i>
            Student Attendance System
        </a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar min-vh-100">

            <div class="pt-4">

                <a href="/" class="nav-link text-white mb-2">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>

                <a href="/students/" class="nav-link text-white mb-2">
                    <i class="bi bi-people-fill"></i>
                    Students
                </a>

                <a href="/teachers/" class="nav-link text-white mb-2">
                    <i class="bi bi-person-badge-fill"></i>
                    Teachers
                </a>

                <a href="/courses/" class="nav-link text-white mb-2">
                    <i class="bi bi-book-fill"></i>
                    Courses
                </a>

                <a href="/attendance/" class="nav-link text-white mb-2">
                    <i class="bi bi-calendar-check-fill"></i>
                    Attendance
                </a>

                <hr class="text-secondary">

                <a href="/accounts/login/" class="nav-link text-danger">
                    <i class="bi bi-box-arrow-right"></i>
                    Login
                </a>

            </div>

        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            {% block content %}
            {% endblock %}

        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
