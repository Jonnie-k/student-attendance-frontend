{% extends "frontend/base.html" %}

{% block title %}
{% if student %}Edit Student{% else %}Add Student{% endif %}
{% endblock %}

{% block content %}

<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h3>
            {% if student %}
                Edit Student
            {% else %}
                Add Student
            {% endif %}
        </h3>
    </div>

    <div class="card-body">

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    value="{{ student.username|default:'' }}"
                    required>
            </div>

            <div class="mb-3">
                <label>First Name</label>
                <input
                    type="text"
                    name="first_name"
                    class="form-control"
                    value="{{ student.first_name|default:'' }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Last Name</label>
                <input
                    type="text"
                    name="last_name"
                    class="form-control"
                    value="{{ student.last_name|default:'' }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Admission Number</label>
                <input
                    type="text"
                    name="admission_number"
                    class="form-control"
                    value="{{ student.admission_number|default:'' }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input
                    type="text"
                    name="phone_number"
                    class="form-control"
                    value="{{ student.phone_number|default:'' }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Gender</label>

                <select
                    name="gender"
                    class="form-select"
                    required>

                    <option value="Male"
                        {% if student.gender == "Male" %}selected{% endif %}>
                        Male
                    </option>

                    <option value="Female"
                        {% if student.gender == "Female" %}selected{% endif %}>
                        Female
                    </option>

                </select>
            </div>

            <button class="btn btn-success">
                {% if student %}
                    Update Student
                {% else %}
                    Save Student
                {% endif %}
            </button>

            <a href="{% url 'students' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
